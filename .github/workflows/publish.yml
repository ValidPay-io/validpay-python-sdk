name: Publish to PyPI

on:
  release:
    types: [published]
  # Allow re-firing publishes when a release run failed (e.g. v1.0.1's
  # first run hit the contents-permission bug before this block was
  # added). Run against `main` after a release tag is in place.
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read   # Required so actions/checkout can fetch the
                       # release tag (defaults to NONE when any other
                       # permission is set explicitly).

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
